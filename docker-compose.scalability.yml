# Overlay para escalar consumidores sem conflito de porta no host.
#
# Pre-requisito: imagens fcg/*:latest ja buildadas (.\build-images.ps1).
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.scalability.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.scalability.yml up -d --scale payments-api=3 --scale notifications-api=2

services:
  payments-api:
    ports: []

  notifications-api:
    ports: []
