# Mailpit: servidor SMTP de teste + caixa de entrada web.
# O Notifications.Api envia os e-mails para o Service "mailpit" na porta 1025
# (ver Smtp__Host / Smtp__Port no configmap.yaml do Notifications).
#
#   kubectl apply -f k8s/mailpit.yaml
#   kubectl port-forward svc/mailpit 8025:8025   # abre http://localhost:8025
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          ports:
            - containerPort: 1025
              name: smtp
            - containerPort: 8025
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
spec:
  selector:
    app: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: http
      port: 8025
      targetPort: 8025
