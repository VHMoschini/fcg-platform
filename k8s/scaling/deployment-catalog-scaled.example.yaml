# Exemplo de Deployment do Catalog API com 3 replicas.
#
# Fica FORA do k8s/ do repo do Catalog de proposito: ele declara um Deployment
# com o mesmo nome (catalog-api) do deployment.yaml padrao, entao um
# "kubectl apply -f k8s/" no repo do Catalog aplicaria os dois no mesmo lote.
#
# Para usar (substitui o Deployment padrao ja aplicado):
#   kubectl apply -f k8s/scaling/deployment-catalog-scaled.example.yaml
#
# Alternativa sem editar YAML:
#   kubectl scale deployment catalog-api --replicas=3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: fcg/catalog-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: catalog-api-config
          env:
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: catalog-api-secret
                  key: jwt-key
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: catalog-api-secret
                  key: connection-string
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: catalog-api-secret
                  key: rabbitmq-username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: catalog-api-secret
                  key: rabbitmq-password
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
